name: Multi-OS Release BlueTower

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # On remplace ubuntu-latest par ubuntu-22.04 ou ubuntu-20.04
        os: [windows-latest, ubuntu-22.04, macos-latest] 
        include:
          - os: windows-latest
            bin_ext: ".exe"
            artifact_name: "BlueTower-Windows.exe"
            sep: ";"
          - os: ubuntu-22.04 # <--- On change ici aussi
            bin_ext: ""
            artifact_name: "BlueTower-Linux"
            sep: ":"
          - os: macos-latest
            bin_ext: ""
            artifact_name: "BlueTower-Mac"
            sep: ":"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconsole --onefile \
        --name "BlueTower" \
        --paths src \
        --add-data "assets/sprite/*.png${{ matrix.sep }}assets/sprite" \
        --add-data "assets/font${{ matrix.sep }}assets/font" \
        --add-data "assets/audio/music/*.wav${{ matrix.sep }}assets/audio/music" \
        --add-data "assets/audio/sfx/*.mp3${{ matrix.sep }}assets/audio/sfx" \
        --add-data "src/ui/*.json${{ matrix.sep }}src/ui" \
        --add-data "src/entities/*.json${{ matrix.sep }}src/entities" \
        src/main.py

    # RENOMMAGE PRECIS : On utilise le nom exact généré par PyInstaller
    - name: Rename binary
      shell: bash
      run: |
        mv dist/BlueTower${{ matrix.bin_ext }} dist/${{ matrix.artifact_name }}

    - name: Upload temporary artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.os }}
        path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-binaries
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: all-binaries/*
        tag_name: v1.0.${{ github.run_number }}
        name: "BlueTower v1.0.${{ github.run_number }}"
        body: |
          ### 🚀 BlueTower Multi-OS Release
          
          Version stable générée automatiquement.
          
          **Fichiers disponibles :**
          - Windows (.exe)
          - Linux (Binaire)
          - Mac (Binaire)
        draft: false
        prerelease: false