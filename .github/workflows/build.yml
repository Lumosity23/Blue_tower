name: Build and Release BlueTower

on:
  push:
    branches: [ main ] # Se déclenche uniquement sur main

permissions:
  contents: write # Indispensable pour créer une Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile `
        --name "BlueTower" `
        --add-data "assets/*.png;assets" `
        --add-data "assets/font;assets/font" `
        --add-data "src/ui/*.json;src/ui" `
        --add-data "src/ui/panel/*.py;src/ui/panel" `
        --paths src `
        src/main.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/BlueTower.exe
        tag_name: v1.0.${{ github.run_number }}
        name: BlueTower Release v1.0.${{ github.run_number }}
        body: |
          Nouvelle version stable de BlueTower.
          Générée automatiquement par GitHub Actions.
        draft: false
        prerelease: false